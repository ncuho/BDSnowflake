version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bigdata_snowflake_db
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - ./data:/data
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: